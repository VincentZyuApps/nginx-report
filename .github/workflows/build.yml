name: Build and Publish

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Stage 1: Check commit message
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "(build action|build publish)"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✓ Commit message contains build trigger"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "✗ Commit message does not contain build trigger"
            echo "   Skipping build (commit: ${GITHUB_SHA:0:7})"
          fi

  # Stage 2: Build Docker image
  build:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc
      
      - name: Download dependencies
        working-directory: ./go
        run: go mod download
      
      - name: Build
        working-directory: ./go
        run: CGO_ENABLED=1 go build -o server .
      
      - name: Verify build
        working-directory: ./go
        run: ls -la server
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          VERSION="${GITHUB_SHA:0:7}-$(date +%Y%m%d-%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Build version: $VERSION"

      - name: Build Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./go
          push: true
          tags: |
            vincentzyu233/nginx-report:latest
            vincentzyu233/nginx-report:${{ steps.version.outputs.version }}
            ghcr.io/vincentzyuapps/nginx-report:latest
            ghcr.io/vincentzyuapps/nginx-report:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=nginx-report
            org.opencontainers.image.description=Nginx access log statistics

  # Stage 3: Publish to Docker Hub (update README)
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v3
        with:
          repository: vincentzyu233/nginx-report
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          readme-filepath: readme.md
          short-description: Nginx access log statistics tool
      
      - name: Success notification
        run: |
          echo "✅ Build and publish completed!"
          echo "   Version: ${{ needs.build.outputs.version }}"
          echo "   Docker Hub: https://hub.docker.com/r/vincentzyu233/nginx-report"