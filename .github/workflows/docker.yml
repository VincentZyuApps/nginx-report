name: Build & Publish Docker

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  # ── 检查Commit消息 ───────────────────────────────────
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_publish: ${{ steps.flags.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"
          
          # PR 始终构建，不发布
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true"    >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "📋 PR模式: build=true publish=false"
            exit 0
          fi
          
          BUILD=false
          PUBLISH=false
          
          # "build publish" = 构建 + 发布 DockerHub & GitHub Packages
          if echo "$MSG" | grep -qi "build publish"; then
            BUILD=true
            PUBLISH=true
          # "build action" = 仅构建（CI测试）
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi
          
          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          
          echo "📋 Commit: build=$BUILD publish=$PUBLISH"

  # ── 构建镜像 ────────────────────────────────────────
  build:
    name: Build Docker image
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: needs.check.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Login to GitHub Container Registry
        if: needs.check.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            nginx-report
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./go
          push: ${{ needs.check.outputs.should_publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          IMAGE: ${{ steps.meta.outputs.image }}