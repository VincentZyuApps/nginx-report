<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nginx IP Monitor</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 40px; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1300px; margin: 0 auto; }
        h2 { color: #0f172a; font-size: 1.8rem; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background-color: #f1f5f9; }
        .controls { margin-bottom: 24px; padding: 16px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        .controls a { color: #3b82f6; text-decoration: none; font-weight: 500; margin: 0 8px; padding: 4px 8px; border-radius: 6px; }
        .controls a:hover { background: #eff6ff; }
        .location-tag { color: #059669; font-weight: 600; }
        .isp-tag { color: #94a3b8; font-size: 0.75rem; }
        .location-loading { color: #f59e0b; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛰️ 访客 IP 属地查询</h2>
        
        <div class="controls">
            <strong>排序：</strong>
            <a href="/?sort=ip&order=asc">IP 升</a> | <a href="/?sort=ip&order=desc">IP 降</a>
            <span style="color:#e2e8f0; margin: 0 10px;">|</span>
            <a href="/?sort=count&order=asc">次数 升</a> | <a href="/?sort=count&order=desc">次数 降</a>
            <span style="color:#e2e8f0; margin: 0 10px;">|</span>
            <span id="status">{{ '第' + str(done) + '/' + str(total) + '个IP查询中...' if running else '已加载完成' }}</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="200">访客 IP</th>
                    <th width="100">请求次数</th>
                    <th>属地 (缓存 30 天)</th>
                </tr>
            </thead>
            <tbody>
                {% for item in data %}
                <tr>
                    <td><code>{{ item.ip }}</code></td>
                    <td><b style="color:#3b82f6;">{{ item.count }}</b></td>
                    <td class="loc-{{ item.ip }}">
                        {% if item.status == 'pending' %}
                        <span class="location-loading">待查询</span>
                        {% else %}
                        <span class="location-tag">📍 {{ item.location }}</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('/status');
                const st = await res.json();
                
                if (st.running) {
                    document.getElementById('status').innerText = '第' + st.done + '/' + st.total + '个IP查询中...';
                    setTimeout(() => location.reload(), 2000);
                } else if (st.done > 0 && st.done === st.total) {
                    document.getElementById('status').innerText = '已加载完成';
                    setTimeout(() => location.reload(), 1000);
                }
            } catch(e) {}
        }
        
        if ({{ 'true' if running else 'false' }}) {
            setInterval(updateStatus, 3000);
        }
    </script>
</body>
</html>
