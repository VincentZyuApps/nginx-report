<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nginx IP Monitor - Ultra Pro Max</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 40px; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1300px; margin: 0 auto; }
        h2 { color: #0f172a; display: flex; align-items: center; gap: 12px; font-size: 1.8rem; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background-color: #f1f5f9; }
        .controls { margin-bottom: 24px; padding: 16px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        .controls a { color: #3b82f6; text-decoration: none; font-weight: 500; margin: 0 8px; padding: 4px 8px; border-radius: 6px; }
        .controls a:hover { background: #eff6ff; }
        
        /* 状态样式 */
        .location-tag { color: #059669; font-weight: 600; display: block; }
        .isp-tag { color: #94a3b8; font-size: 0.75rem; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-top: 4px; }
        .status-waiting { background: #dbeafe; color: #1e40af; animation: pulse 2s infinite; }
        .status-retry { background: #ffedd5; color: #9a3412; }
        
        @keyframes pulse { 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛰️ 访客 IP 地理位置实时解析</h2>
        
        <div class="controls">
            <strong>智能排序：</strong>
            <a href="/?sort=ip&order=asc">IP 升序</a> | <a href="/?sort=ip&order=desc">IP 降序</a>
            <span style="color:#e2e8f0; margin: 0 10px;">|</span>
            <a href="/?sort=count&order=asc">频率 升序</a> | <a href="/?sort=count&order=desc">频率 降序</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="200">访客 IP</th>
                    <th width="100">请求次数</th>
                    <th>地理位置解析状态 (多 API 指数退避重试)</th>
                </tr>
            </thead>
            <tbody>
                {% for item in data %}
                <tr>
                    <td class="ip-address"><code>{{ item.ip }}</code></td>
                    <td><b style="color:#3b82f6;">{{ item.count }}</b></td>
                    <td class="location-cell" id="cell-{{ loop.index }}">
                        <span class="status-badge status-waiting">排队调度中...</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        // API 库定义
        const API_CONFIGS = [
            {
                name: "IP-API",
                url: (ip) => `http://ip-api.com/json/${ip}?lang=zh-CN`,
                parser: (d) => d.status === 'success' ? `${d.country} ${d.regionName} ${d.city} [${d.isp}]` : null
            },
            {
                name: "FreeIP",
                url: (ip) => `https://freeipapi.com/api/json/${ip}`,
                parser: (d) => d.cityName ? `${d.countryName} ${d.regionName} ${d.cityName} [${d.asFullName}]` : null
            },
            {
                name: "IP-Whois",
                url: (ip) => `https://ipwhois.app/json/${ip}`,
                parser: (d) => d.success ? `${d.country} ${d.region} ${d.city} [${d.isp}]` : null
            }
        ];

        async function fetchIpWithSmartRetry(ip, cellId) {
            const cell = document.getElementById(cellId);
            let retryCount = 0;
            let currentDelay = 2000; // 初始 2s
            const maxDelay = 1024000; // 上限 1024s

            while (true) {
                // 轮询选择 API
                const api = API_CONFIGS[retryCount % API_CONFIGS.length];
                
                try {
                    const response = await fetch(api.url(ip));
                    
                    if (response.status === 429) throw new Error("RateLimit");
                    if (!response.ok) throw new Error("NetworkError");

                    const data = await response.json();
                    const result = api.parser(data);

                    if (result) {
                        cell.innerHTML = `
                            <span class="location-tag">📍 ${result}</span>
                            <span class="isp-tag">解析完成 (API: ${api.name})</span>
                        `;
                        return;
                    } else {
                        cell.innerHTML = `<span style="color:#ef4444;">解析返回空结果</span>`;
                        return;
                    }

                } catch (err) {
                    retryCount++;
                    const nextRetrySec = currentDelay / 1000;
                    
                    // 开启倒计时显示
                    updateRetryUI(cell, retryCount, nextRetrySec, api.name);

                    // 倒计时逻辑
                    for(let s = nextRetrySec; s > 0; s--) {
                        await new Promise(r => setTimeout(r, 1000));
                        updateRetryUI(cell, retryCount, s, api.name);
                    }

                    // 指数加倍，上限 1024s
                    currentDelay = Math.min(currentDelay * 2, maxDelay);
                }
            }
        }

        function updateRetryUI(cell, k, sec, apiName) {
            cell.innerHTML = `
                <div class="status-badge status-retry">
                    ⚠️ 第 ${k} 次重试 | API: ${apiName} | 下次尝试: ${Math.ceil(sec)}s 后
                </div>
            `;
        }

        async function run() {
            const rows = document.querySelectorAll('tbody tr');
            for (let i = 0; i < rows.length; i++) {
                const ip = rows[i].querySelector('.ip-address').innerText.trim();
                const cellId = `cell-${i+1}`;
                
                // 异步启动，不阻塞循环
                fetchIpWithSmartRetry(ip, cellId);
                
                // 启动间隔 200ms，防止瞬间 QPS 过高
                await new Promise(r => setTimeout(r, 200));
            }
        }

        window.addEventListener('load', run);
    </script>
</body>
</html>
